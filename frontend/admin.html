<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Leanttro WPP</title>
<style>
  :root {
    --bg: #0f0f13;
    --bg2: #18181f;
    --bg3: #22222c;
    --accent: #7c3aed;
    --accent2: #6d28d9;
    --danger: #ef4444;
    --success: #22c55e;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #2d2d3a;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 40px; width: 360px;
  }
  .login-box h1 { font-size: 1.4rem; margin-bottom: 8px; }
  .login-box p { color: var(--muted); font-size: .9rem; margin-bottom: 28px; }

  /* MAIN */
  #main-screen { display: none; }
  header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
  header h1 span { font-size: 1.4rem; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; text-align: center;
  }
  .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .stat-card .lbl { font-size: .8rem; color: var(--muted); margin-top: 4px; }

  /* SECTION */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-header h2 { font-size: 1.1rem; }

  /* FORM ROW */
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
  .form-group label { font-size: .8rem; color: var(--muted); }

  input, select {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 9px 12px; font-size: .9rem; outline: none;
    transition: border .2s;
  }
  input:focus, select:focus { border-color: var(--accent); }

  button {
    padding: 9px 18px; border-radius: 8px; border: none; font-size: .875rem;
    font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s;
  }
  button:hover { opacity: .88; }
  button:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #000; }
  .btn-warn    { background: var(--warn); color: #000; }
  .btn-ghost   { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-sm { padding: 5px 11px; font-size: .78rem; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  thead th {
    text-align: left; padding: 10px 14px; color: var(--muted);
    font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 12px 14px; vertical-align: middle; }

  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: .72rem; font-weight: 600;
  }
  .badge-green  { background: #14532d; color: #86efac; }
  .badge-red    { background: #450a0a; color: #fca5a5; }
  .badge-purple { background: #3b0764; color: #d8b4fe; }

  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; margin-bottom: 28px;
  }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 20px; font-size: .875rem;
    opacity: 0; transform: translateY(8px);
    transition: all .3s; pointer-events: none; z-index: 999;
    max-width: 320px;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok   { border-color: var(--success); color: var(--success); }
  #toast.err  { border-color: var(--danger);  color: var(--danger); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.65); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; width: 420px; max-width: 95vw;
  }
  .modal h3 { margin-bottom: 20px; }
  .modal .actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  .divider { height: 1px; background: var(--border); margin: 24px 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>🛡️ Painel Admin</h1>
    <p>Acesso restrito — somente administradores</p>
    <div class="form-group" style="margin-bottom:12px">
      <label>Token de Admin</label>
      <input type="password" id="token-input" placeholder="Cole o ADMIN_TOKEN aqui" />
    </div>
    <button class="btn-primary" style="width:100%;margin-top:8px" onclick="fazerLogin()">Entrar</button>
    <p id="login-err" style="color:var(--danger);font-size:.82rem;margin-top:10px;display:none">Token inválido ou erro de conexão.</p>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <header>
    <h1><span>🛡️</span> Admin — Leanttro WPP</h1>
    <button class="btn-ghost btn-sm" onclick="sair()">Sair</button>
  </header>

  <div class="container">

    <!-- STATS -->
    <div class="stats" id="stats">
      <div class="stat-card"><div class="num" id="st-total">—</div><div class="lbl">Usuários Total</div></div>
      <div class="stat-card"><div class="num" id="st-ativos" style="color:var(--success)">—</div><div class="lbl">Ativos</div></div>
      <div class="stat-card"><div class="num" id="st-inativos" style="color:var(--danger)">—</div><div class="lbl">Inativos</div></div>
    </div>

    <!-- CRIAR USUÁRIO -->
    <div class="card">
      <div class="section-header"><h2>➕ Criar Usuário</h2></div>
      <div class="form-row">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="new-nome" placeholder="João Silva" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="new-email" placeholder="joao@email.com" />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="new-senha" placeholder="Senha forte" />
        </div>
        <div class="form-group" style="max-width:140px">
          <label>Plano</label>
          <select id="new-plano">
            <option value="Free">Free</option>
          </select>
        </div>
        <div class="form-group" style="max-width:110px;justify-content:flex-end">
          <button class="btn-primary" onclick="criarUsuario()">Criar</button>
        </div>
      </div>
    </div>

    <!-- LISTA -->
    <div class="card">
      <div class="section-header">
        <h2>👥 Usuários</h2>
        <button class="btn-ghost btn-sm" onclick="carregarUsuarios()">↻ Atualizar</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Plano</th>
              <th>Status</th>
              <th>Criado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="usuarios-tbody">
            <tr><td colspan="7" style="color:var(--muted);text-align:center;padding:24px">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- MODAL TROCAR PLANO -->
<div class="modal-overlay" id="modal-plano">
  <div class="modal">
    <h3>Trocar Plano</h3>
    <input type="hidden" id="modal-user-id" />
    <div class="form-group">
      <label>Novo Plano</label>
      <select id="modal-plano-select">
        <option value="Free">Free</option>
      </select>
    </div>
    <div class="actions">
      <button class="btn-ghost" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" onclick="confirmarTrocarPlano()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const API = 'https://wpp.leanttro.com';
let adminToken = '';

// ── AUTH ─────────────────────────────────
async function fazerLogin() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  // Testa o token fazendo uma chamada real
  try {
    const r = await fetch(`${API}/admin/usuarios?x_admin_token=${encodeURIComponent(t)}`);
    if (!r.ok) throw new Error();
    adminToken = t;
    sessionStorage.setItem('admin_token', t);
    mostrarPainel();
  } catch {
    document.getElementById('login-err').style.display = 'block';
  }
}

function sair() {
  sessionStorage.removeItem('admin_token');
  adminToken = '';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function mostrarPainel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  carregarPlanos();
  carregarUsuarios();
}

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});

// ── AUTO-LOGIN ───────────────────────────
const saved = sessionStorage.getItem('admin_token');
if (saved) { adminToken = saved; mostrarPainel(); }

// ── API HELPERS ──────────────────────────
async function apiFetch(path, opts = {}) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `${API}${path}${sep}x_admin_token=${encodeURIComponent(adminToken)}`;
  const r = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.detail || r.status);
  }
  return r.json();
}

// ── PLANOS ───────────────────────────────
async function carregarPlanos() {
  try {
    const planos = await apiFetch('/admin/planos');
    const opts = planos.map(p => `<option value="${p.nome}">${p.nome}</option>`).join('');
    document.getElementById('new-plano').innerHTML = opts;
    document.getElementById('modal-plano-select').innerHTML = opts;
  } catch {}
}

// ── USUÁRIOS ─────────────────────────────
async function carregarUsuarios() {
  try {
    const users = await apiFetch('/admin/usuarios');
    renderTabela(users);
    renderStats(users);
  } catch (e) {
    toast('Erro ao carregar usuários: ' + e.message, 'err');
  }
}

function renderStats(users) {
  document.getElementById('st-total').textContent = users.length;
  document.getElementById('st-ativos').textContent = users.filter(u => u.ativo).length;
  document.getElementById('st-inativos').textContent = users.filter(u => !u.ativo).length;
}

function renderTabela(users) {
  const tbody = document.getElementById('usuarios-tbody');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="color:var(--muted);text-align:center;padding:24px">Nenhum usuário ainda</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td style="color:var(--muted)">${u.id}</td>
      <td><strong>${esc(u.nome)}</strong></td>
      <td style="color:var(--muted)">${esc(u.email)}</td>
      <td><span class="badge badge-purple">${esc(u.plano_nome || '—')}</span></td>
      <td>
        <span class="badge ${u.ativo ? 'badge-green' : 'badge-red'}">
          ${u.ativo ? 'Ativo' : 'Inativo'}
        </span>
      </td>
      <td style="color:var(--muted);font-size:.8rem">${formatDate(u.criado_em)}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn-sm ${u.ativo ? 'btn-warn' : 'btn-success'}"
            onclick="toggleAtivo(${u.id}, ${u.ativo})">
            ${u.ativo ? 'Desativar' : 'Ativar'}
          </button>
          <button class="btn-sm btn-ghost" onclick="abrirModalPlano(${u.id}, '${esc(u.plano_nome || 'Free')}')">
            Plano
          </button>
          <button class="btn-sm btn-danger" onclick="deletarUsuario(${u.id}, '${esc(u.nome)}')">
            Excluir
          </button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ── CRIAR ────────────────────────────────
async function criarUsuario() {
  const nome  = document.getElementById('new-nome').value.trim();
  const email = document.getElementById('new-email').value.trim();
  const senha = document.getElementById('new-senha').value.trim();
  const plano = document.getElementById('new-plano').value;
  if (!nome || !email || !senha) { toast('Preencha todos os campos', 'err'); return; }
  try {
    await apiFetch('/admin/usuarios', {
      method: 'POST',
      body: JSON.stringify({ nome, email, senha, plano_nome: plano })
    });
    document.getElementById('new-nome').value  = '';
    document.getElementById('new-email').value = '';
    document.getElementById('new-senha').value = '';
    toast('Usuário criado com sucesso!', 'ok');
    carregarUsuarios();
  } catch (e) {
    toast('Erro: ' + e.message, 'err');
  }
}

// ── TOGGLE ATIVO ─────────────────────────
async function toggleAtivo(id, ativoAtual) {
  try {
    await apiFetch(`/admin/usuarios/${id}/ativo`, {
      method: 'PATCH',
      body: JSON.stringify({ ativo: !ativoAtual })
    });
    toast(ativoAtual ? 'Usuário desativado' : 'Usuário ativado', 'ok');
    carregarUsuarios();
  } catch (e) {
    toast('Erro: ' + e.message, 'err');
  }
}

// ── TROCAR PLANO ─────────────────────────
function abrirModalPlano(id, planoAtual) {
  document.getElementById('modal-user-id').value = id;
  const sel = document.getElementById('modal-plano-select');
  for (const opt of sel.options) {
    opt.selected = opt.value === planoAtual;
  }
  document.getElementById('modal-plano').classList.add('open');
}

function fecharModal() {
  document.getElementById('modal-plano').classList.remove('open');
}

async function confirmarTrocarPlano() {
  const id    = document.getElementById('modal-user-id').value;
  const plano = document.getElementById('modal-plano-select').value;
  try {
    await apiFetch(`/admin/usuarios/${id}/plano`, {
      method: 'PATCH',
      body: JSON.stringify({ plano_nome: plano })
    });
    fecharModal();
    toast('Plano atualizado!', 'ok');
    carregarUsuarios();
  } catch (e) {
    toast('Erro: ' + e.message, 'err');
  }
}

// ── DELETAR ──────────────────────────────
async function deletarUsuario(id, nome) {
  if (!confirm(`Excluir permanentemente o usuário "${nome}"?\n\nEsta ação não pode ser desfeita.`)) return;
  try {
    await apiFetch(`/admin/usuarios/${id}`, { method: 'DELETE' });
    toast('Usuário excluído', 'ok');
    carregarUsuarios();
  } catch (e) {
    toast('Erro: ' + e.message, 'err');
  }
}

// ── UTILS ────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' });
}

// Fechar modal clicando fora
document.getElementById('modal-plano').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});
</script>
</body>
</html>
